name: Publish signed Unity UPM package to npm

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  PACKAGE_PATH: "."
  OUTPUT_PATH: "dist"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org/"

      - name: Install Unity UPM CLI
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSL https://cdn.packages.unity.com/upm-cli/install.sh | bash

          echo "$HOME/.upm/bin" >> "$GITHUB_PATH"

          "$HOME/.upm/bin/upm" --version

      - name: Pack and sign Unity UPM package
        shell: bash
        env:
          UPM_SERVICE_ACCOUNT_KEY_ID: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_ID }}
          UPM_SERVICE_ACCOUNT_KEY_SECRET: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_SECRET }}
          UNITY_ORGANIZATION_ID: ${{ secrets.UNITY_ORGANIZATION_ID }}
        run: |
          set -euo pipefail

          mkdir -p "$OUTPUT_PATH"

          upm pack "$PACKAGE_PATH" \
            --organization-id "$UNITY_ORGANIZATION_ID" \
            --destination "$OUTPUT_PATH"

          echo "Created package:"
          ls -la "$OUTPUT_PATH"

          echo "Verify Unity signature:"
          tar -tf "$OUTPUT_PATH"/*.tgz | grep -E '^package/\.attestation\.p7m$'

      - name: Publish signed package to npm
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          PACKAGE_FILE="$(find "$OUTPUT_PATH" -name "*.tgz" -type f | head -n 1)"

          if [ -z "$PACKAGE_FILE" ]; then
            echo "No .tgz package found in $OUTPUT_PATH"
            exit 1
          fi

          PACKAGE_FILE="$(realpath "$PACKAGE_FILE")"

          echo "Publishing package: $PACKAGE_FILE"

          npm publish "$PACKAGE_FILE" --access public

